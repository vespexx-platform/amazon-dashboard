<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Amazon 판매 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#f7f8fa; --sidebar:#ffffff; --card:#ffffff; --fg:#0b1220; --muted:#f1f5f9;
    --muted-fg:#64748b; --border:#e6e9ef; --primary:#4f46e5; --primary-fg:#ffffff;
    --ring:rgba(79,70,229,.30);
    --c-sales:#4f46e5; --c-sessions:#f43f5e; --c-conv:#0ea5e9; --c-buybox:#16a34a; --c-pv:#a855f7;
    --r:12px;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#0a0b0f; --sidebar:#0d0f14; --card:#111318; --fg:#e8ebf2; --muted:#171a21;
      --muted-fg:#8b93a5; --border:#20242e; --ring:rgba(99,102,241,.35);
      --c-sales:#818cf8; --c-sessions:#fb7185; --c-conv:#38bdf8; --c-buybox:#4ade80; --c-pv:#c084fc; }
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,"Apple SD Gothic Neo",sans-serif;
    background:var(--bg); color:var(--fg); -webkit-font-smoothing:antialiased;}
  a{color:inherit}

  /* ---- app shell ---- */
  .shell{display:grid; grid-template-columns:236px 1fr; min-height:100vh}
  .sidebar{background:var(--sidebar); border-right:1px solid var(--border); padding:18px 14px;
    display:flex; flex-direction:column; gap:6px; position:sticky; top:0; height:100vh}
  .brand{display:flex; align-items:center; gap:10px; padding:6px 8px 16px}
  .brand .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--primary),#7c3aed);
    display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px}
  .brand b{font-size:14.5px;letter-spacing:-.2px}
  .navlabel{font-size:11px;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.08em;padding:8px 8px 4px}
  .nav{display:flex;flex-direction:column;gap:2px}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:none;cursor:pointer;
    background:transparent;color:var(--muted-fg);font-size:14px;padding:9px 10px;border-radius:9px;font-weight:500}
  .nav button:hover{background:var(--muted);color:var(--fg)}
  .nav button.active{background:var(--muted);color:var(--fg);font-weight:600}
  .nav button .ico{width:17px;text-align:center;opacity:.9}
  .side-foot{margin-top:auto;padding:10px 8px;border-top:1px solid var(--border);font-size:11.5px;color:var(--muted-fg)}

  /* ---- main ---- */
  .main{padding:22px 26px 60px; max-width:1180px}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .topbar h1{margin:0;font-size:19px;letter-spacing:-.3px}
  .topbar .sub{color:var(--muted-fg);font-size:12.5px;margin-top:3px}
  .actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .badge{font-size:11.5px;color:var(--muted-fg);background:var(--muted);border:1px solid var(--border);
    padding:5px 10px;border-radius:999px}
  .btn{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;text-decoration:none;
    padding:7px 13px;border-radius:999px;border:1px solid var(--border);background:var(--card);color:var(--fg)}
  .btn.primary{background:var(--primary);border-color:var(--primary);color:var(--primary-fg)}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px;margin-bottom:16px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px}
  .stat .k{font-size:12px;color:var(--muted-fg);display:flex;align-items:center;gap:6px}
  .stat .v{font-size:23px;font-weight:750;margin-top:7px;letter-spacing:-.4px}
  .stat .d{font-size:12px;margin-top:4px;color:var(--muted-fg)}
  .up{color:var(--c-buybox)} .down{color:var(--c-sessions)}
  .dot{width:8px;height:8px;border-radius:3px;display:inline-block}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media (max-width:900px){ .grid2{grid-template-columns:1fr} .shell{grid-template-columns:1fr}
    .sidebar{position:static;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center}
    .nav{flex-direction:row;flex-wrap:wrap} .side-foot{display:none} .navlabel{display:none} }
  .chartcard h3{margin:0 0 2px;font-size:13.5px;font-weight:650}
  .chartcard .cap{font-size:11.5px;color:var(--muted-fg);margin-bottom:12px}
  .canwrap{position:relative;height:230px}
  .canwrap.sm{height:200px}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:9px 10px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--muted-fg);font-weight:600;position:sticky;top:0;background:var(--card)}
  tbody tr:hover{background:var(--muted)}
  .tablewrap{overflow-x:auto}
  .view{display:none} .view.active{display:block}

  /* ---- gate ---- */
  .overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:20}
  .gate{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:30px;width:330px;max-width:90vw;text-align:center}
  .gate .logo{width:40px;height:40px;border-radius:11px;margin:0 auto 14px;background:linear-gradient(135deg,var(--primary),#7c3aed);display:grid;place-items:center;color:#fff;font-weight:800}
  .gate h2{margin:0 0 4px;font-size:17px} .gate p{color:var(--muted-fg);font-size:13px;margin:0 0 18px}
  .gate input{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--fg);font-size:15px;outline:none}
  .gate input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--ring)}
  .gate button{width:100%;margin-top:11px;padding:11px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:15px;font-weight:650;cursor:pointer}
  .err{color:var(--c-sessions);font-size:13px;min-height:18px;margin-top:9px}
  #shell{display:none}
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <form class="gate" id="gate">
    <div class="logo">a</div>
    <h2>Amazon 판매 대시보드</h2>
    <p>비밀번호를 입력하세요</p>
    <input type="password" id="pw" autocomplete="current-password" autofocus>
    <button type="submit">열기</button>
    <div class="err" id="err"></div>
  </form>
</div>

<div class="shell" id="shell">
  <aside class="sidebar">
    <div class="brand"><div class="logo">a</div><b>Amazon 대시보드</b></div>
    <div class="navlabel">메뉴</div>
    <div class="nav" id="nav">
      <button data-view="overview" class="active"><span class="ico">▦</span> 개요</button>
      <button data-view="traffic"><span class="ico">◔</span> 트래픽 · 전환</button>
      <button data-view="daily"><span class="ico">▤</span> 날짜별 데이터</button>
    </div>
    <div class="side-foot" id="foot"></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1 id="viewTitle">개요</h1>
        <div class="sub" id="sub"></div>
      </div>
      <div class="actions">
        <span class="badge" id="updated"></span>
        <a class="btn" id="scLink" target="_blank" rel="noopener">셀러센트럴</a>
      </div>
    </div>

    <!-- 개요 -->
    <section class="view active" data-view="overview">
      <div class="kpis" id="kpis"></div>
      <div class="card chartcard">
        <h3>매출 · 세션</h3><div class="cap">일별 상품매출(막대)과 세션(선)</div>
        <div class="canwrap"><canvas id="cMain"></canvas></div>
      </div>
    </section>

    <!-- 트래픽 · 전환 (버이박스/전환율 분리) -->
    <section class="view" data-view="traffic">
      <div class="grid2">
        <div class="card chartcard">
          <h3>전환율</h3><div class="cap">Unit Session % — 세션 대비 구매 전환</div>
          <div class="canwrap sm"><canvas id="cConv"></canvas></div>
        </div>
        <div class="card chartcard">
          <h3>바이박스 점유율</h3><div class="cap">Buy Box % — 낮아지면 매출 직결</div>
          <div class="canwrap sm"><canvas id="cBuybox"></canvas></div>
        </div>
      </div>
      <div class="card chartcard" style="margin-top:12px">
        <h3>페이지뷰 · 세션</h3><div class="cap">트래픽 유입 추이</div>
        <div class="canwrap sm"><canvas id="cTraffic"></canvas></div>
      </div>
    </section>

    <!-- 날짜별 -->
    <section class="view" data-view="daily">
      <div class="card">
        <div class="tablewrap"><table>
          <thead><tr>
            <th>날짜</th><th>매출($)</th><th>주문</th><th>수량</th><th>페이지뷰</th>
            <th>세션</th><th>전환%</th><th>바이박스%</th><th>반품</th>
          </tr></thead><tbody id="tbody"></tbody>
        </table></div>
      </div>
    </section>
  </main>
</div>

<script>
const DASHBOARD_URL = location.origin + location.pathname;
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function decrypt(enc, password){
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(enc.salt),iterations:enc.iters,hash:"SHA-256"},
    km, {name:"AES-GCM",length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(enc.iv)}, key, b64(enc.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
const money=n=>"$"+n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const int=n=>n.toLocaleString();
const css=k=>getComputedStyle(document.documentElement).getPropertyValue(k).trim();

function chartDefaults(){
  Chart.defaults.font.family="-apple-system,Inter,sans-serif";
  Chart.defaults.color=css("--muted-fg");
  Chart.defaults.plugins.legend.labels.boxWidth=10;
  Chart.defaults.plugins.legend.labels.boxHeight=10;
  Chart.defaults.plugins.legend.labels.usePointStyle=true;
  Chart.defaults.plugins.tooltip.backgroundColor="#0b0d12";
  Chart.defaults.plugins.tooltip.borderColor="rgba(255,255,255,.08)";
  Chart.defaults.plugins.tooltip.borderWidth=1;
  Chart.defaults.plugins.tooltip.padding=10;
  Chart.defaults.plugins.tooltip.cornerRadius=8;
  Chart.defaults.plugins.tooltip.titleColor="#fff";
  Chart.defaults.plugins.tooltip.bodyColor="#cbd3e1";
  Chart.defaults.maintainAspectRatio=false;
}
const grid=()=>({color:css("--border"),drawTicks:false});
const baseScales=()=>({x:{grid:{display:false},ticks:{color:css("--muted-fg")}}});

function render(data){
  const s=data.series;
  document.getElementById("sub").textContent=`${data.tz} 기준 · ${s.length}일 · Amazon US`;
  document.getElementById("updated").textContent="업데이트 "+data.generated;
  document.getElementById("foot").innerHTML=`최근 갱신<br>${data.generated}`;
  document.getElementById("scLink").href="https://sellercentral.amazon.com/business-reports";

  const last=s[s.length-1], d7=s.slice(-7);
  const sum=(a,f)=>a.reduce((x,r)=>x+r[f],0), avg=(a,f)=>a.length?sum(a,f)/a.length:0;
  const kpis=[
    ["최근일 매출", money(last.sales), last.date.slice(5), "--c-sales"],
    ["최근일 주문", int(last.items)+"건", last.units+"개 판매", "--c-conv"],
    ["최근일 전환율", last.conv.toFixed(1)+"%", "세션 "+int(last.sessions), "--c-conv"],
    ["최근일 바이박스", last.buybox.toFixed(1)+"%", "", "--c-buybox"],
    ["최근 7일 매출", money(sum(d7,"sales")), "평균 "+money(avg(d7,"sales")), "--c-sales"],
    ["최근 7일 세션", int(sum(d7,"sessions")), "평균 전환 "+avg(d7,"conv").toFixed(1)+"%", "--c-sessions"],
  ];
  document.getElementById("kpis").innerHTML=kpis.map(([k,v,d,c])=>
    `<div class="card stat"><div class="k"><span class="dot" style="background:${css(c)}"></span>${k}</div>
     <div class="v">${v}</div><div class="d">${d||"&nbsp;"}</div></div>`).join("");

  document.getElementById("tbody").innerHTML=s.slice().reverse().map(r=>
    `<tr><td>${r.date.slice(5)}</td><td>${money(r.sales)}</td><td>${int(r.items)}</td><td>${int(r.units)}</td>
     <td>${int(r.pageViews)}</td><td>${int(r.sessions)}</td><td>${r.conv.toFixed(1)}</td>
     <td>${r.buybox.toFixed(1)}</td><td>${int(r.refunded)}</td></tr>`).join("");

  chartDefaults();
  window.__S__=s;
  buildView("overview");
}

// 차트는 해당 뷰가 처음 보일 때 생성(숨김 상태 폭 0 문제 방지)
const BUILT={};
function buildView(v){
  if(BUILT[v]) return; BUILT[v]=true;
  const s=window.__S__, L=s.map(r=>r.date.slice(5));
  if(v==="overview"){
    new Chart(cMain,{data:{labels:L,datasets:[
      {type:"bar",label:"매출($)",data:s.map(r=>r.sales),backgroundColor:css("--c-sales"),borderRadius:5,yAxisID:"y"},
      {type:"line",label:"세션",data:s.map(r=>r.sessions),borderColor:css("--c-sessions"),backgroundColor:css("--c-sessions"),tension:.35,pointRadius:2,yAxisID:"y1"}]},
      options:{scales:{...baseScales(),y:{grid:grid(),ticks:{color:css("--muted-fg")}},
        y1:{position:"right",grid:{display:false},ticks:{color:css("--muted-fg")}}}}});
  }
  if(v==="traffic"){
    new Chart(cConv,{type:"line",data:{labels:L,datasets:[
      {label:"전환율 %",data:s.map(r=>r.conv),borderColor:css("--c-conv"),backgroundColor:css("--c-conv")+"22",
       fill:true,tension:.35,pointRadius:2}]},
      options:{plugins:{legend:{display:false}},scales:{...baseScales(),y:{grid:grid(),ticks:{color:css("--muted-fg"),callback:v=>v+"%"}}}}});
    new Chart(cBuybox,{type:"line",data:{labels:L,datasets:[
      {label:"바이박스 %",data:s.map(r=>r.buybox),borderColor:css("--c-buybox"),backgroundColor:css("--c-buybox")+"22",
       fill:true,tension:.35,pointRadius:2}]},
      options:{plugins:{legend:{display:false}},scales:{...baseScales(),
        y:{grid:grid(),suggestedMin:Math.max(0,Math.min(...s.map(r=>r.buybox))-2),suggestedMax:100,ticks:{color:css("--muted-fg"),callback:v=>v+"%"}}}}});
    new Chart(cTraffic,{data:{labels:L,datasets:[
      {type:"line",label:"페이지뷰",data:s.map(r=>r.pageViews),borderColor:css("--c-pv"),backgroundColor:css("--c-pv")+"22",fill:true,tension:.35,pointRadius:2},
      {type:"line",label:"세션",data:s.map(r=>r.sessions),borderColor:css("--c-sessions"),tension:.35,pointRadius:2}]},
      options:{scales:{...baseScales(),y:{grid:grid(),ticks:{color:css("--muted-fg")}}}}});
  }
}

document.getElementById("nav").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  const v=b.dataset.view;
  document.querySelectorAll("#nav button").forEach(x=>x.classList.toggle("active",x===b));
  document.querySelectorAll(".view").forEach(x=>x.classList.toggle("active",x.dataset.view===v));
  document.getElementById("viewTitle").textContent=b.textContent.trim();
  requestAnimationFrame(()=>buildView(v));
});

document.getElementById("gate").addEventListener("submit",async e=>{
  e.preventDefault();
  const err=document.getElementById("err"); err.textContent="";
  try{
    const data=await decrypt(window.__ENC__, document.getElementById("pw").value);
    document.getElementById("overlay").style.display="none";
    document.getElementById("shell").style.display="grid";
    render(data);
  }catch(_){ err.textContent="비밀번호가 올바르지 않습니다"; }
});
</script>
<script src="./data.js"></script>
</body>
</html>
