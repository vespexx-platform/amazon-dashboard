<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Amazon 판매 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#f6f7f8; --sidebar:#ffffff; --card:#ffffff; --fg:#111418; --muted:#f2f3f5;
    --muted-fg:#6b7280; --border:#e5e7eb; --primary:#18181b; --primary-fg:#ffffff;
    --ring:rgba(0,0,0,.14);
    --c-sales:#4f46e5; --c-sessions:#f43f5e; --c-conv:#0ea5e9; --c-buybox:#16a34a; --c-pv:#a855f7;
    --r:12px;
  }
  @media (prefers-color-scheme:dark){
    :root{ --bg:#0a0b0d; --sidebar:#0e0f12; --card:#141517; --fg:#e9eaec; --muted:#1a1b1f;
      --muted-fg:#9096a0; --border:#26282d; --primary:#e9eaec; --primary-fg:#0a0b0d;
      --ring:rgba(255,255,255,.16);
      --c-sales:#818cf8; --c-sessions:#fb7185; --c-conv:#38bdf8; --c-buybox:#4ade80; --c-pv:#c084fc; }
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,"Apple SD Gothic Neo",sans-serif;
    background:var(--bg); color:var(--fg); -webkit-font-smoothing:antialiased;}
  a{color:inherit}
  svg{display:block}

  .shell{display:grid; grid-template-columns:236px 1fr; min-height:100vh}
  .sidebar{background:var(--sidebar); border-right:1px solid var(--border); padding:18px 14px;
    display:flex; flex-direction:column; gap:6px; position:sticky; top:0; height:100vh}
  .brand{display:flex; align-items:center; gap:10px; padding:6px 8px 16px}
  .brand .logo{width:30px;height:30px;border-radius:9px;background:var(--primary);
    display:grid;place-items:center;color:var(--primary-fg);font-weight:800;font-size:15px}
  .brand b{font-size:14.5px;letter-spacing:-.2px}
  .navlabel{font-size:11px;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.08em;padding:8px 8px 4px}
  .nav{display:flex;flex-direction:column;gap:2px}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:none;cursor:pointer;
    background:transparent;color:var(--muted-fg);font-size:14px;padding:9px 10px;border-radius:9px;font-weight:500}
  .nav button:hover{background:var(--muted);color:var(--fg)}
  .nav button.active{background:var(--muted);color:var(--fg);font-weight:600}
  .nav button svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;
    stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto}
  .side-foot{margin-top:auto;padding:10px 8px;border-top:1px solid var(--border);font-size:11.5px;color:var(--muted-fg)}

  .main{padding:22px 26px 60px; max-width:1180px}
  .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .topbar h1{margin:0;font-size:19px;letter-spacing:-.3px}
  .topbar .sub{color:var(--muted-fg);font-size:12.5px;margin-top:3px}
  .actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .badge{font-size:11.5px;color:var(--muted-fg);background:var(--muted);border:1px solid var(--border);
    padding:6px 10px;border-radius:999px}
  .btn{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;text-decoration:none;
    padding:6px 13px;border-radius:999px;border:1px solid var(--border);background:var(--card);color:var(--fg)}
  .seg{display:inline-flex;background:var(--muted);border:1px solid var(--border);border-radius:999px;padding:3px;gap:2px}
  .seg button{border:none;background:transparent;color:var(--muted-fg);font-size:12px;font-weight:600;
    padding:5px 11px;border-radius:999px;cursor:pointer}
  .seg button.on{background:var(--card);color:var(--fg);box-shadow:0 1px 2px rgba(0,0,0,.08)}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px;margin-bottom:16px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px}
  .stat .k{font-size:12px;color:var(--muted-fg)}
  .stat .v{font-size:23px;font-weight:750;margin-top:7px;letter-spacing:-.4px}
  .stat .d{font-size:12px;margin-top:4px;color:var(--muted-fg)}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .chartcard h3{margin:0 0 2px;font-size:13.5px;font-weight:650}
  .chartcard .cap{font-size:11.5px;color:var(--muted-fg);margin-bottom:12px}
  .canwrap{position:relative;height:230px}
  .canwrap.sm{height:200px}

  .tablehead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .pager{display:inline-flex;align-items:center;gap:8px}
  .pager button{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--card);
    color:var(--fg);cursor:pointer;display:grid;place-items:center}
  .pager button:disabled{opacity:.4;cursor:default}
  .pager button svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .pager .mlabel{font-size:14px;font-weight:650;min-width:88px;text-align:center}
  .msum{font-size:12px;color:var(--muted-fg)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:9px 10px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--muted-fg);font-weight:600}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--muted)}
  .tablewrap{overflow-x:auto}
  td.low{color:var(--c-sessions);font-weight:700}
  td.namecell{white-space:normal;min-width:200px;max-width:320px}
  td.namecell>div{line-height:1.35;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  @media (max-width:560px){ td.namecell{min-width:150px;max-width:220px} td.namecell>div{-webkit-line-clamp:2} }
  .view{display:none} .view.active{display:block}

  @media (max-width:900px){
    .shell{grid-template-columns:1fr}
    .sidebar{position:sticky;top:0;z-index:5;height:auto;flex-direction:row;align-items:center;gap:10px;
      padding:10px 14px;border-right:none;border-bottom:1px solid var(--border);overflow-x:auto}
    .brand{padding:0;flex:0 0 auto} .brand b{display:none}
    .navlabel,.side-foot{display:none}
    .nav{flex-direction:row;gap:6px} .nav button{white-space:nowrap;padding:8px 12px}
    .main{padding:16px 16px 48px;max-width:none}
    .grid2{grid-template-columns:1fr}
  }
  @media (max-width:560px){
    .kpis{grid-template-columns:1fr 1fr;gap:10px}
    .stat .v{font-size:20px} .main{padding:14px 12px 44px} .topbar h1{font-size:17px}
    .canwrap{height:200px} .canwrap.sm{height:180px} .seg button{padding:5px 9px;font-size:11px}
  }

  .overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:20}
  .gate{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:30px;width:330px;max-width:90vw;text-align:center}
  .gate .logo{width:40px;height:40px;border-radius:11px;margin:0 auto 14px;background:var(--primary);display:grid;place-items:center;color:var(--primary-fg);font-weight:800}
  .gate h2{margin:0 0 4px;font-size:17px} .gate p{color:var(--muted-fg);font-size:13px;margin:0 0 18px}
  .gate input{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--fg);font-size:15px;outline:none}
  .gate input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--ring)}
  .gate button{width:100%;margin-top:11px;padding:11px;border:none;border-radius:10px;background:var(--primary);color:var(--primary-fg);font-size:15px;font-weight:650;cursor:pointer}
  .err{color:var(--c-sessions);font-size:13px;min-height:18px;margin-top:9px}
  #shell{display:none}
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <form class="gate" id="gate">
    <div class="logo">a</div>
    <h2>Amazon 판매 대시보드</h2>
    <p>비밀번호를 입력하세요</p>
    <input type="password" id="pw" autocomplete="current-password" autofocus>
    <button type="submit">열기</button>
    <div class="err" id="err"></div>
  </form>
</div>

<div class="shell" id="shell">
  <aside class="sidebar">
    <div class="brand"><div class="logo">a</div><b>Amazon 대시보드</b></div>
    <div class="navlabel">메뉴</div>
    <div class="nav" id="nav">
      <button data-view="overview" class="active">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
        개요</button>
      <button data-view="traffic">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        트래픽 · 전환</button>
      <button data-view="products">
        <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        상품(ASIN)</button>
      <button data-view="inventory">
        <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        재고</button>
      <button data-view="daily">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        날짜별 데이터</button>
    </div>
    <div class="side-foot" id="foot"></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div><h1 id="viewTitle">개요</h1><div class="sub" id="sub"></div></div>
      <div class="actions">
        <span class="badge" id="updated"></span>
        <div class="seg" id="seg">
          <button data-g="daily">일</button><button data-g="weekly">주</button>
          <button data-g="monthly" class="on">월</button><button data-g="quarterly">분기</button>
          <button data-g="yearly">년</button>
        </div>
        <a class="btn" id="scLink" target="_blank" rel="noopener">셀러센트럴</a>
      </div>
    </div>

    <section class="view active" data-view="overview">
      <div class="kpis" id="kpisOv"></div>
      <div class="card chartcard">
        <h3>매출 · 세션</h3><div class="cap" id="capMain"></div>
        <div class="canwrap"><canvas id="cMain"></canvas></div>
      </div>
    </section>

    <section class="view" data-view="traffic">
      <div class="kpis" id="kpisTr"></div>
      <div class="grid2">
        <div class="card chartcard"><h3>전환율</h3><div class="cap">Unit Session % — 세션 대비 구매 전환</div>
          <div class="canwrap sm"><canvas id="cConv"></canvas></div></div>
        <div class="card chartcard"><h3>바이박스 점유율</h3><div class="cap">Buy Box % — 낮아지면 매출 직결</div>
          <div class="canwrap sm"><canvas id="cBuybox"></canvas></div></div>
      </div>
      <div class="card chartcard" style="margin-top:12px"><h3>페이지뷰 · 세션</h3><div class="cap">트래픽 유입 추이</div>
        <div class="canwrap sm"><canvas id="cTraffic"></canvas></div></div>
    </section>

    <section class="view" data-view="daily">
      <div class="card">
        <div class="tablehead">
          <div class="pager">
            <button id="prevM"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
            <span class="mlabel" id="mlabel"></span>
            <button id="nextM"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
          </div>
          <div class="msum" id="msum"></div>
        </div>
        <div class="tablewrap"><table>
          <thead><tr>
            <th>날짜</th><th>매출($)</th><th>주문</th><th>수량</th><th>페이지뷰</th>
            <th>세션</th><th>전환%</th><th>바이박스%</th><th>반품</th>
          </tr></thead><tbody id="tbody"></tbody>
        </table></div>
      </div>
    </section>

    <section class="view" data-view="products">
      <div class="card">
        <div class="tablehead"><div class="mlabel" style="min-width:0">상품별 요약 <span class="msum" id="prodNote"></span></div></div>
        <div class="tablewrap"><table>
          <thead><tr><th>ASIN</th><th>상품명</th><th>매출($)</th><th>판매</th><th>세션</th><th>페이지뷰</th><th>전환%</th><th>바이박스%</th></tr></thead>
          <tbody id="prodBody"></tbody>
        </table></div>
      </div>
    </section>

    <section class="view" data-view="inventory">
      <div class="kpis" id="kpisInv"></div>
      <div class="card">
        <div class="tablehead"><div class="mlabel" style="min-width:0">FBA 재고 <span class="msum" id="invNote"></span></div></div>
        <div class="tablewrap"><table>
          <thead><tr><th>SKU</th><th>ASIN</th><th>상품명</th><th>가용</th><th>예약</th><th>입고중</th><th>총재고</th></tr></thead>
          <tbody id="invBody"></tbody>
        </table></div>
      </div>
    </section>
  </main>
</div>

<script>
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function decrypt(enc, password){
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(enc.salt),iterations:enc.iters,hash:"SHA-256"},
    km, {name:"AES-GCM",length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(enc.iv)}, key, b64(enc.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
const money=n=>"$"+n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const money0=n=>"$"+n.toLocaleString(undefined,{maximumFractionDigits:0});
const int=n=>n.toLocaleString();
const css=k=>getComputedStyle(document.documentElement).getPropertyValue(k).trim();

let S=[], P=[], INV=[], curGran="monthly", months=[], monthIdx=0;
const LOW_STOCK=10;

// ---- 기간 집계 ----
function isoWeek(d){
  const t=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate()));
  const day=(t.getUTCDay()+6)%7; t.setUTCDate(t.getUTCDate()-day+3);
  const first=new Date(Date.UTC(t.getUTCFullYear(),0,4));
  const wk=1+Math.round(((t-first)/864e5-3+((first.getUTCDay()+6)%7))/7);
  return t.getUTCFullYear()+"-W"+String(wk).padStart(2,"0");
}
function bkey(ds,g){
  const d=new Date(ds+"T00:00:00Z"), y=d.getUTCFullYear(), m=d.getUTCMonth();
  if(g==="daily")return ds.slice(5);
  if(g==="weekly")return isoWeek(d);
  if(g==="monthly")return `${y}-${String(m+1).padStart(2,"0")}`;
  if(g==="quarterly")return `${y} Q${Math.floor(m/3)+1}`;
  return `${y}`;
}
function aggregate(g){
  const src = g==="daily" ? S.slice(-90) : S;
  const map=new Map();
  for(const r of src){
    const k=bkey(r.date,g);
    if(!map.has(k)) map.set(k,{key:k,sales:0,sessions:0,units:0,items:0,pageViews:0,bbSum:0,n:0});
    const b=map.get(k);
    b.sales+=r.sales; b.sessions+=r.sessions; b.units+=r.units; b.items+=r.items;
    b.pageViews+=r.pageViews; b.bbSum+=r.buybox; b.n++;
  }
  return [...map.values()].map(b=>({...b, conv:b.sessions?b.units/b.sessions*100:0, buybox:b.n?b.bbSum/b.n:0}));
}
const GLABEL={daily:"최근 90일 · 일별",weekly:"주별",monthly:"월별",quarterly:"분기별",yearly:"연도별"};

// ---- 차트 정의 ----
function chartDefaults(){
  Chart.defaults.font.family="-apple-system,Inter,sans-serif";
  Chart.defaults.color=css("--muted-fg");
  Chart.defaults.plugins.legend.labels.usePointStyle=true;
  Chart.defaults.plugins.legend.labels.boxWidth=8; Chart.defaults.plugins.legend.labels.boxHeight=8;
  Chart.defaults.plugins.tooltip.backgroundColor="#0b0d12";
  Chart.defaults.plugins.tooltip.padding=10; Chart.defaults.plugins.tooltip.cornerRadius=8;
  Chart.defaults.plugins.tooltip.titleColor="#fff"; Chart.defaults.plugins.tooltip.bodyColor="#cbd3e1";
  Chart.defaults.maintainAspectRatio=false;
}
const grid=()=>({color:css("--border"),drawTicks:false});
const xs=()=>({grid:{display:false},ticks:{color:css("--muted-fg"),maxRotation:0,autoSkip:true,maxTicksLimit:12}});
const pt=g=>g==="daily"?1.5:2.5;

const CHARTS={
  cMain:(a)=>({data:{labels:a.map(b=>b.key),datasets:[
    {type:"bar",label:"매출($)",data:a.map(b=>b.sales),backgroundColor:css("--c-sales"),borderRadius:4,yAxisID:"y"},
    {type:"line",label:"세션",data:a.map(b=>b.sessions),borderColor:css("--c-sessions"),tension:.3,pointRadius:pt(curGran),yAxisID:"y1"}]},
    options:{scales:{x:xs(),y:{grid:grid(),ticks:{color:css("--muted-fg")}},
      y1:{position:"right",grid:{display:false},ticks:{color:css("--muted-fg")}}}}}),
  cConv:(a)=>({type:"line",data:{labels:a.map(b=>b.key),datasets:[
    {label:"전환율 %",data:a.map(b=>b.conv),borderColor:css("--c-conv"),backgroundColor:css("--c-conv")+"22",fill:true,tension:.3,pointRadius:pt(curGran)}]},
    options:{plugins:{legend:{display:false}},scales:{x:xs(),y:{grid:grid(),ticks:{color:css("--muted-fg"),callback:v=>v+"%"}}}}}),
  cBuybox:(a)=>({type:"line",data:{labels:a.map(b=>b.key),datasets:[
    {label:"바이박스 %",data:a.map(b=>b.buybox),borderColor:css("--c-buybox"),backgroundColor:css("--c-buybox")+"22",fill:true,tension:.3,pointRadius:pt(curGran)}]},
    options:{plugins:{legend:{display:false}},scales:{x:xs(),
      y:{grid:grid(),suggestedMin:Math.max(0,Math.min(...a.map(b=>b.buybox))-2),suggestedMax:100,ticks:{color:css("--muted-fg"),callback:v=>v+"%"}}}}}),
  cTraffic:(a)=>({data:{labels:a.map(b=>b.key),datasets:[
    {type:"line",label:"페이지뷰",data:a.map(b=>b.pageViews),borderColor:css("--c-pv"),backgroundColor:css("--c-pv")+"22",fill:true,tension:.3,pointRadius:pt(curGran)},
    {type:"line",label:"세션",data:a.map(b=>b.sessions),borderColor:css("--c-sessions"),tension:.3,pointRadius:pt(curGran)}]},
    options:{scales:{x:xs(),y:{grid:grid(),ticks:{color:css("--muted-fg")}}}}}),
};
function drawChart(id){
  const a=aggregate(curGran);
  const old=Chart.getChart(id); if(old) old.destroy();
  new Chart(document.getElementById(id), CHARTS[id](a));
  const cap=document.getElementById("capMain");
  if(cap) cap.textContent=`상품매출(막대)·세션(선) — ${GLABEL[curGran]} · ${a.length}구간`;
}
const VIEW_CHARTS={overview:["cMain"],traffic:["cConv","cBuybox","cTraffic"],daily:[],products:[],inventory:[]};
function buildView(v){
  VIEW_CHARTS[v].forEach(id=>{ if(!Chart.getChart(id)) drawChart(id); });
  if(v==="daily") renderMonth();
  if(v==="products") renderProducts();
  if(v==="inventory") renderInventory();
}
function renderProducts(){
  document.getElementById("prodNote").textContent=`· 누적 기준 · ${P.length}개`;
  document.getElementById("prodBody").innerHTML = P.length ? P.map(p=>
    `<tr><td>${p.asin}</td><td class="namecell"><div>${p.name||p.sku||"-"}</div></td><td>${money(p.sales)}</td><td>${int(p.units)}</td>
     <td>${int(p.sessions)}</td><td>${int(p.pageViews)}</td><td>${p.conv.toFixed(2)}</td><td>${p.buybox.toFixed(1)}</td></tr>`).join("")
    : `<tr><td colspan="8" style="text-align:center;color:var(--muted-fg)">상품 데이터 없음</td></tr>`;
}
function renderInventory(){
  const nz=v=>v==null?"-":int(v);
  const low=INV.filter(i=>i.available<LOW_STOCK).length, avail=INV.reduce((x,i)=>x+i.available,0);
  const inbSum=INV.some(i=>i.inbound!=null)?INV.reduce((x,i)=>x+(i.inbound||0),0):null;
  const oos=INV.filter(i=>i.available===0).length;
  kpiCards("kpisInv",[
    ["SKU 수", int(INV.length)+"개", ""],
    ["품절 SKU", int(oos)+"개", "가용 0"],
    ["저재고 SKU", int(low)+"개", `가용 ${LOW_STOCK}개 미만`],
    ["총 가용 재고", int(avail)+"개", inbSum==null?"입고중 정보 없음":`입고중 ${int(inbSum)}개`],
  ]);
  document.getElementById("invNote").textContent = INV.length ? `· ${INV.length} SKU · 가용 적은 순` : "";
  document.getElementById("invBody").innerHTML = INV.length ? INV.map(i=>
    `<tr><td>${i.sku}</td><td>${i.asin}</td><td class="namecell"><div>${i.name||"-"}</div></td>
     <td${i.available<LOW_STOCK?' class="low"':''}>${int(i.available)}</td>
     <td>${nz(i.reserved)}</td><td>${nz(i.inbound)}</td><td>${nz(i.total)}</td></tr>`).join("")
    : `<tr><td colspan="7" style="text-align:center;color:var(--muted-fg)">재고 데이터 없음 (FBA 재고 수집 대기중)</td></tr>`;
}

// ---- KPI ----
const sum=(a,f)=>a.reduce((x,r)=>x+r[f],0), avg=(a,f)=>a.length?sum(a,f)/a.length:0;
function kpiCards(el, arr){
  document.getElementById(el).innerHTML=arr.map(([k,v,d])=>
    `<div class="card stat"><div class="k">${k}</div><div class="v">${v}</div><div class="d">${d||"&nbsp;"}</div></div>`).join("");
}
const mmdd=ds=>(+ds.slice(5,7))+"/"+(+ds.slice(8,10));
function renderKPIs(){
  const last=S[S.length-1], d7=S.slice(-7);
  const dL=mmdd(last.date), rL=d7.length>1?mmdd(d7[0].date)+"~"+mmdd(last.date):dL;
  kpiCards("kpisOv",[
    ["최근일 매출", money(last.sales), dL+" 기준"],
    ["최근일 주문", int(last.items)+"건", dL+" · "+last.units+"개 판매"],
    ["최근 7일 매출", money(sum(d7,"sales")), rL+" · 평균 "+money(avg(d7,"sales"))],
    ["최근 7일 세션", int(sum(d7,"sessions")), rL+" · 평균 전환 "+avg(d7,"conv").toFixed(1)+"%"],
  ]);
  const wConv=sum(d7,"units")/(sum(d7,"sessions")||1)*100;
  kpiCards("kpisTr",[
    ["최근일 전환율", last.conv.toFixed(1)+"%", dL+" · 세션 "+int(last.sessions)],
    ["최근일 바이박스", last.buybox.toFixed(1)+"%", dL+" 기준"],
    ["7일 평균 전환율", wConv.toFixed(1)+"%", rL],
    ["7일 평균 바이박스", avg(d7,"buybox").toFixed(1)+"%", rL],
  ]);
}

// ---- 날짜별(월 페이지네이션) ----
function renderMonth(){
  const m=months[monthIdx];
  document.getElementById("mlabel").textContent=m;
  document.getElementById("prevM").disabled = monthIdx<=0;
  document.getElementById("nextM").disabled = monthIdx>=months.length-1;
  const rows=S.filter(r=>r.date.startsWith(m)).slice().reverse();
  const tot=f=>rows.reduce((x,r)=>x+r[f],0);
  document.getElementById("msum").textContent=
    `매출 ${money0(tot("sales"))} · 주문 ${int(tot("items"))}건 · 세션 ${int(tot("sessions"))} · 평균 전환 ${(tot("units")/(tot("sessions")||1)*100).toFixed(1)}%`;
  document.getElementById("tbody").innerHTML=rows.map(r=>
    `<tr><td>${r.date}</td><td>${money(r.sales)}</td><td>${int(r.items)}</td><td>${int(r.units)}</td>
     <td>${int(r.pageViews)}</td><td>${int(r.sessions)}</td><td>${r.conv.toFixed(1)}</td>
     <td>${r.buybox.toFixed(1)}</td><td>${int(r.refunded)}</td></tr>`).join("");
}

function render(data){
  S=data.series; P=data.products||[]; INV=data.inventory||[]; chartDefaults();
  document.getElementById("sub").textContent=
    `${data.tz} · ${mmdd(S[0].date)}~${mmdd(S[S.length-1].date)} · ${S.length}일 · Amazon US`;
  document.getElementById("updated").textContent="업데이트 "+data.generated;
  document.getElementById("foot").innerHTML=`최근 갱신<br>${data.generated}`;
  document.getElementById("scLink").href="https://sellercentral.amazon.com/business-reports";
  months=[...new Set(S.map(r=>r.date.slice(0,7)))].sort();
  monthIdx=months.length-1;
  renderKPIs();
  buildView("overview");
}

// ---- 이벤트 ----
document.getElementById("nav").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  const v=b.dataset.view;
  document.querySelectorAll("#nav button").forEach(x=>x.classList.toggle("active",x===b));
  document.querySelectorAll(".view").forEach(x=>x.classList.toggle("active",x.dataset.view===v));
  document.getElementById("viewTitle").textContent=b.textContent.trim();
  // rAF는 탭이 백그라운드면 fire되지 않아 뷰가 비어 보일 수 있음 → setTimeout 사용
  setTimeout(()=>buildView(v), 0);
});
document.getElementById("seg").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  curGran=b.dataset.g;
  document.querySelectorAll("#seg button").forEach(x=>x.classList.toggle("on",x===b));
  ["cMain","cConv","cBuybox","cTraffic"].forEach(id=>{ if(Chart.getChart(id)) drawChart(id); });
});
document.getElementById("prevM").addEventListener("click",()=>{ if(monthIdx>0){monthIdx--; renderMonth();} });
document.getElementById("nextM").addEventListener("click",()=>{ if(monthIdx<months.length-1){monthIdx++; renderMonth();} });

document.getElementById("gate").addEventListener("submit",async e=>{
  e.preventDefault();
  const err=document.getElementById("err"); err.textContent="";
  try{
    const enc=await (window.__ENC_READY__||Promise.resolve(window.__ENC__));
    const data=await decrypt(enc, document.getElementById("pw").value);
    document.getElementById("overlay").style.display="none";
    document.getElementById("shell").style.display="grid";
    render(data);
  }catch(_){ err.textContent="비밀번호가 올바르지 않습니다"; }
});
</script>
<script>
// data.js는 매 로드마다 캐시버스터로 받아온다(브라우저 캐시로 옛 데이터가 보이는 문제 방지)
window.__ENC_READY__ = new Promise((resolve, reject) => {
  const s = document.createElement("script");
  s.src = "./data.js?t=" + Date.now();
  s.onload = () => resolve(window.__ENC__);
  s.onerror = () => reject(new Error("data.js 로드 실패"));
  document.head.appendChild(s);
});
</script>
